function welcome(){layout(`<section class="welcome"><div class="brand">IEUM <small>理音</small></div><div class="welcome-mark">이 음</div><div class="welcome-copy"><p class="eyebrow">선부3동 나눔 연결 플랫폼</p><h1>들리지 않던 이웃의 사정을,<br>조용히 잇는 일.</h1><p>이 클릭형 프로토타입에서는 역할별 핵심 업무 흐름을 체험할 수 있습니다.</p></div><div class="role-list">${Object.entries(roles).map(([k,v])=>`<button class="role-card" data-role="${k}"><span class="role-icon">${k==='donor'?'心':k==='member'?'結':'保'}</span><span><strong>${v.label}${k==='member'?'으로':'로'} 둘러보기</strong><span>${v.desc}</span></span></button>`).join('')}</div><button class="secondary full overview-entry" data-go="process-map">전체 프로세스 한눈에 보기 →</button><div class="prototype-note">데모 데이터만 사용하는 제품 검증용 프로토타입입니다.</div></section>`,'',{noNav:true})}
function processMap(){layout(`<section class="process-page">${header('전체 프로세스',true)}<div class="process-intro"><p class="eyebrow">ONE-PAGE PROCESS MAP</p><h1>필요를 발견한 순간부터<br>안전한 전달까지.</h1><p>세 역할이 어떤 순서로 연결되는지, 예외 상황에서는 어떻게 처리하는지 한 페이지에 정리했습니다.</p></div><div class="role-legend"><div class="legend-item"><b>心</b><span>후원자</span></div><div class="legend-item"><b>結</b><span>협의체 위원</span></div><div class="legend-item"><b>保</b><span>운영자</span></div></div><article class="card master-flow flat"><div class="flow-step"><span class="flow-no">01</span><div class="flow-copy"><strong>필요 발굴·비식별 등록</strong><p>대상자 계정 없이 위원이 필요한 내용만 기록합니다.</p><span class="role-tag member">협의체 위원</span></div></div><div class="flow-step"><span class="flow-no">02</span><div class="flow-copy"><strong>케이스 검토</strong><p>동의 근거·최소 정보·우선순위를 확인합니다.</p><span class="role-tag admin">운영자</span></div></div><div class="flow-step"><span class="flow-no">03</span><div class="flow-copy"><strong>나눔 자원 등록·인증</strong><p>인증 나눔가게가 수량과 제공 기간을 등록합니다.</p><span class="role-tag donor">후원자</span><span class="role-tag admin">운영자</span></div></div><div class="flow-step"><span class="flow-no">04</span><div class="flow-copy"><strong>자원 탐색·매칭 제안</strong><p>카테고리·수량·기간이 맞는 자원을 위원이 선택합니다.</p><span class="role-tag member">협의체 위원</span></div></div><div class="flow-step"><span class="flow-no">05</span><div class="flow-copy"><strong>협의체 공동 승인</strong><p>개인 위원의 단독 결정이 아니라 정족수 검토를 거칩니다.</p><span class="role-tag admin">운영자·승인자</span></div></div><div class="flow-step"><span class="flow-no">06</span><div class="flow-copy"><strong>일정 확정·위원 중개 전달</strong><p>후원자에게 대상자의 연락처·상세 주소를 공개하지 않습니다.</p><span class="role-tag donor">후원자</span><span class="role-tag member">협의체 위원</span></div></div><div class="flow-step"><span class="flow-no">07</span><div class="flow-copy"><strong>완료 기록·월간 보고</strong><p>식별정보를 제외한 활동 기록과 집계만 남깁니다.</p><span class="role-tag member">협의체 위원</span><span class="role-tag admin">운영자</span></div></div></article><div class="section-head"><h3>상황별 처리</h3><span class="tiny">4가지 대표 상황</span></div><div class="scenario-grid"><article class="card scenario flat"><div class="scenario-top"><span class="pill">일반</span><span class="tiny">표준 흐름</span></div><h3>일반 케이스</h3><div class="mini-flow"><span>등록</span><i>→</i><span>검토</span><i>→</i><span>매칭</span><i>→</i><span>승인</span><i>→</i><span>전달</span></div><p class="scenario-note">정상 정족수와 일정에 따라 순서대로 진행합니다.</p></article><article class="card scenario flat"><div class="scenario-top"><span class="pill red">긴급</span><span class="tiny">우선 검토</span></div><h3>긴급 지원 필요</h3><div class="mini-flow"><span>긴급 표시</span><i>→</i><span>신속 검토</span><i>→</i><span>긴급 정족수</span><i>→</i><span>전달</span></div><p class="scenario-note">자동 승인하지 않으며, 협의체가 정한 신속 승인 규칙을 적용합니다.</p></article><article class="card scenario flat"><div class="scenario-top"><span class="pill warn">수정</span><span class="tiny">정보 보완</span></div><h3>수정이 필요한 케이스</h3><div class="mini-flow"><span>수정 요청</span><i>→</i><span>위원 보완</span><i>→</i><span>재검토</span><i>→</i><span>승인</span></div><p class="scenario-note">반려 사유와 변경 이력을 감사 로그에 남깁니다.</p></article><article class="card scenario flat"><div class="scenario-top"><span class="pill dark">부분 완료</span><span class="tiny">잔여 필요 유지</span></div><h3>수량이 일부만 전달된 경우</h3><div class="mini-flow"><span>부분 전달</span><i>→</i><span>잔여 수량</span><i>→</i><span>재매칭</span><i>→</i><span>완료</span></div><p class="scenario-note">완료 수량만 차감하고 남은 필요는 새로운 매칭으로 이어갑니다.</p></article></div><div class="process-principle"><strong>이음의 공통 원칙</strong><p>대상자는 앱에 등장하지 않고, 후원자는 최소 정보만 보며, 모든 승인과 상태 변경은 기록으로 남습니다.</p></div></section>`,'',{noNav:true})}
function roleNav(){if(state.role==='donor')return tabs([['donor-home','홈','home'],['donor-offers','나눔','offer'],['donor-matches','매칭','match'],['donor-history','기록','history']]);if(state.role==='member')return tabs([['member-home','홈','home'],['member-cases','케이스','case'],['member-resources','연결','resource'],['member-activity','활동','activity']]);return tabs([['admin-home','현황','home'],['admin-reviews','검토','review'],['admin-orgs','조직','org'],['admin-reports','보고','report']])}
function donorHome(){layout(`${header()}<div class="page-head"><p class="eyebrow">인증 나눔가게</p><h1>오늘의 나눔</h1><p>${roles.donor.org} · 인증 완료</p></div><div class="notice"><span class="pill">이번 주</span><h3 style="margin:8px 0 0">도시락 7세트 매칭 요청</h3><p>담당 위원이 신원 노출 없이 전달합니다.</p><button class="secondary small full" style="margin-top:13px" data-go="donor-match-detail">매칭 요청 확인</button></div><div class="stat-grid"><div class="card stat flat"><strong>${state.offers.filter(x=>x.status==='제공 가능').length}</strong><span>제공 가능한 나눔</span></div><div class="card stat flat"><strong>12</strong><span>올해 완료한 나눔</span></div></div><article class="card action-card"><span class="pill dark">NEW</span><h3 style="margin-top:9px">새로운 나눔 등록</h3><p>제공 가능한 물품·식사·서비스를 등록하세요.</p><button class="primary full" data-go="offer-form">새 나눔 등록</button></article><div class="section-head"><h3>최근 나눔</h3><button class="text-btn" data-go="donor-offers">전체 보기</button></div><div class="list">${state.offers.slice(0,2).map(offerCard).join('')}</div>`,roleNav())}
function offerCard(o){return `<article class="card list-card flat"><div class="row between"><span class="pill">${o.category}</span><span class="pill ${o.status==='승인 대기'?'warn':''}">${o.status}</span></div><h3>${o.title}</h3>${o.photoCount?`<div class="tiny" style="margin-bottom:7px">📷 사진 ${o.photoCount}장</div>`:''}<div class="row between"><span class="tiny">${o.org}</span><strong style="font-size:13px">${o.qty}${o.unit}</strong></div></article>`}
function donorOffers(){layout(`${header()}<div class="page-head"><p class="eyebrow">MY OFFERS</p><h1>나의 나눔</h1><p>제공 가능한 수량과 일정을 관리합니다.</p><button class="primary full" data-go="offer-form">새 나눔 등록</button></div><div class="list">${state.offers.map(offerCard).join('')}</div>`,roleNav())}
function offerPhotoPreviewHtml(){return state.offerPhotos.map((p,i)=>`<figure class="photo-item"><img src="${p.src}" alt="나눔 사진 ${i+1}"><button type="button" data-remove-offer-photo="${i}" aria-label="나눔 사진 ${i+1} 삭제">×</button></figure>`).join('')}
function renderOfferPhotoPreview(){const grid=document.querySelector('#offer-photo-preview'),count=document.querySelector('#offer-photo-count');if(grid)grid.innerHTML=offerPhotoPreviewHtml();if(count)count.textContent=`${state.offerPhotos.length}/8`}
function offerForm(){layout(`${header('새 나눔 등록',true)}<form class="form" id="offer-form"><div class="form-note">후원 정보에는 개인 연락처를 적지 않아도 됩니다. 매칭 후 담당 위원이 안전하게 연락합니다.</div><div class="field"><label>나눔 이름</label><input class="input" name="title" value="반찬 꾸러미" required></div><div class="field"><label>종류</label><select class="input" name="category"><option>식사</option><option>물품</option><option>서비스</option><option>수리</option></select></div><div class="row gap"><div class="field grow"><label>제공 수량</label><input class="input" name="qty" type="number" min="1" value="10" required></div><div class="field grow"><label>단위</label><input class="input" name="unit" value="꾸러미" required></div></div><div class="field"><label>제공 가능 기간</label><input class="input" type="date" name="date" value="2026-07-31"></div><div class="field"><div class="row between"><label style="margin:0">나눔 사진</label><span class="tiny" id="offer-photo-count">0/8</span></div><p class="field-help">상태와 구성을 알 수 있도록 여러 장 등록해 주세요. 가격표·연락처 등 불필요한 정보는 가려 주세요.</p><label class="photo-add" for="offer-photos"><span class="camera-icon">＋</span><strong>사진 추가</strong><span>최대 8장</span><input id="offer-photos" type="file" accept="image/*" multiple hidden></label><div class="photo-grid" id="offer-photo-preview" aria-live="polite"></div></div><div class="field"><label>설명</label><textarea class="input" name="desc">주 1회 반찬 3종을 포장해 제공할 수 있습니다.</textarea></div></form><div class="dock"><button class="primary full" data-submit-offer>검토 요청하기</button></div>`,'',{noNav:true});renderOfferPhotoPreview()}
function donorMatches(){layout(`${header()}<div class="page-head"><p class="eyebrow">MATCHES</p><h1>매칭</h1><p>신원 정보 없이 필요한 내용과 전달 상태만 확인합니다.</p></div><div class="list">${state.matches.map(m=>`<article class="card list-card click" data-go="donor-match-detail"><div class="row between"><span class="case-code">${m.caseCode}</span><span class="pill warn">${m.status}</span></div><h3>${m.need}</h3><p>${m.offer}</p></article>`).join('')}</div>`,roleNav())}
function donorMatchDetail(){const m=state.matches[0];layout(`${header('매칭 요청',true)}<div class="page-head"><span class="case-code">${m.caseCode}</span><h1 style="margin-top:10px">한 끼 식사 지원</h1><p>선부3동 · 독거 어르신 · 7월 18일까지</p><div class="privacy"><b>保</b><p><strong>최소 정보만 보여드려요.</strong><br>실명·연락처·상세 주소는 후원자에게 공개되지 않습니다.</p></div></div><article class="card action-card flat"><div class="row between"><span class="pill">매칭 제안</span><strong>도시락 7세트</strong></div><h3 style="margin-top:16px">정담식당 → 담당 위원 중개 전달</h3><p>협의체 승인 후 담당 위원이 매장에서 수령해 전달합니다.</p><div class="timeline"><div class="timeline-row done"><i class="timeline-dot"></i><div><strong>매칭 제안</strong><p>7월 10일 · 김이음 위원</p></div></div><div class="timeline-row"><i class="timeline-dot"></i><div><strong>협의체 공동 승인</strong><p>검토를 기다리고 있어요.</p></div></div><div class="timeline-row"><i class="timeline-dot"></i><div><strong>전달 일정</strong><p>승인 후 정해집니다.</p></div></div></div></article><div class="dock"><button class="primary full" data-confirm-donor>제공 가능 확인</button></div>`,'',{noNav:true})}
function donorHistory(){layout(`${header()}<div class="page-head"><p class="eyebrow">HISTORY</p><h1>나눔 기록</h1><p>완료된 활동만 안전하게 보관합니다.</p></div><div class="stat-grid"><div class="card stat flat"><strong>12</strong><span>완료 매칭</span></div><div class="card stat flat"><strong>38</strong><span>전달 수량</span></div></div><div class="list"><article class="card list-card flat"><div class="row between"><span class="pill">완료</span><span class="tiny">2026.06.28</span></div><h3>생필품 꾸러미 5세트</h3><p>담당 위원 중개 전달 · 개인정보 없음</p></article></div>`,roleNav())}
function memberHome(){layout(`${header()}<div class="compact-action"><button class="primary full" data-go="case-form">＋ 새 케이스 등록</button></div><div class="section-head"><h3>우선 확인할 케이스</h3><button class="text-btn" data-go="member-cases">전체 보기</button></div><div class="list">${state.cases.map(caseCard).join('')}</div>`,roleNav())}
function caseStage(c){const stages=['등록','검토','자원','제안','승인','전달','완료'],indexByStatus={'검토 대기':1,'수정 요청':1,'자원 탐색':2,'매칭 검토':3,'운영 검토 대기':4,'공동 승인 대기':4,'공동 승인 1/2':4,'승인 완료':5,'배송 대기':5,'배송 중':5,'전달 일정 확정':5,'전달 중':5,'완료':6},current=indexByStatus[c.status]??0;return `<div class="case-stage-track"><div class="case-stage-head"><span>전체 진행</span><strong>현재 단계 · ${stages[current]}</strong></div><div class="case-stage-nodes">${stages.map((stage,i)=>`<span class="${i<current?'done':i===current?'current':''}" ${i===current?'aria-current="step"':''}><i></i><b>${stage}</b></span>`).join('')}</div></div>`}
function caseCard(c){return `<article class="case-feed-item" data-case="${c.id}"><div class="case-card-main"><div class="case-thumb"><img src="${c.thumbnail||'assets/case-essentials.webp'}" alt="${c.need} 대표 이미지">${c.photoCount?`<span class="photo-badge">▣ ${c.photoCount}</span>`:''}</div><div class="case-feed-copy"><div class="row between"><span class="case-code">${c.code}</span><span class="pill ${c.priority==='긴급'?'red':''}">${c.priority}</span></div><h3>${c.need}</h3><p>${c.type} · ${c.due}</p></div></div>${caseStage(c)}</article>`}
function memberCases(){layout(`${header()}<div class="page-head"><p class="eyebrow">CASES</p><h1>발굴 케이스</h1><p>담당 케이스의 필요와 진행 상태를 확인합니다.</p><button class="primary full" data-go="case-form">새 케이스 등록</button></div><div class="list">${state.cases.map(caseCard).join('')}</div>`,roleNav())}
function photoPreviewHtml(){return state.casePhotos.map((p,i)=>`<figure class="photo-item"><img src="${p.src}" alt="첨부 사진 ${i+1}"><button type="button" data-remove-photo="${i}" aria-label="첨부 사진 ${i+1} 삭제">×</button></figure>`).join('')}
function renderPhotoPreview(){const grid=document.querySelector('#photo-preview'),count=document.querySelector('#photo-count');if(grid)grid.innerHTML=photoPreviewHtml();if(count)count.textContent=`${state.casePhotos.length}/8`}
function caseForm(){layout(`${header('새 케이스 등록',true)}<form class="form" id="case-form"><div class="form-note"><strong>이름·전화번호·상세 주소를 이 화면에 적지 마세요.</strong><br>프로토타입은 필요 정보만 구조화하는 흐름을 보여줍니다.</div><div class="field"><label>가구 유형</label><select class="input" name="type"><option>독거 어르신</option><option>한부모 가구</option><option>다문화 가구</option><option>기타</option></select></div><div class="field"><label>필요한 도움</label><input class="input" name="need" value="한 끼 식사 지원" required></div><div class="row gap"><div class="field grow"><label>지원 종류</label><select class="input" name="category"><option>식사</option><option>물품</option><option>서비스</option></select></div><div class="field grow"><label>필요 수량</label><input class="input" name="requiredQty" type="number" min="1" value="7" required></div><div class="field unit-field"><label>단위</label><input class="input" name="unit" value="세트" required></div></div><div class="row gap"><div class="field grow"><label>우선순위</label><select class="input" name="priority"><option>일반</option><option>긴급</option></select></div><div class="field grow"><label>필요 시기</label><input class="input" name="due" value="7월 15일까지"></div></div><div class="field"><div class="row between"><label style="margin:0">현장 사진</label><span class="tiny" id="photo-count">0/8</span></div><p class="field-help">사진을 여러 장 선택할 수 있습니다. 얼굴·문패·주소 등 식별정보가 보이지 않는지 확인해 주세요.</p><label class="photo-add" for="case-photos"><span class="camera-icon">＋</span><strong>사진 추가</strong><span>최대 8장</span><input id="case-photos" type="file" accept="image/*" multiple hidden></label><div class="photo-grid" id="photo-preview" aria-live="polite"></div></div><div class="field"><label>전달 제약·메모</label><textarea class="input" name="note" placeholder="민감정보를 제외하고 업무에 필요한 내용만 기록해 주세요.">담당 위원이 중개 전달합니다.</textarea></div><label class="row gap consent-row"><input type="checkbox" required> 상담과 정보 처리에 필요한 동의·근거를 확인했습니다.</label></form><div class="dock"><button class="primary full" data-submit-case>비식별 미리보기</button></div>`,'',{noNav:true});renderPhotoPreview()}
function casePreview(data){layout(`${header('제출 전 미리보기',true)}<div class="page-head"><p class="eyebrow">PSEUDONYMOUS PREVIEW</p><h1>후원자에게는<br>이렇게 보입니다.</h1><p>직접 식별정보는 포함되지 않습니다.</p></div><article class="card action-card flat"><div class="row between"><span class="case-code">SUNBU3-X-2026-NEW</span><span class="pill ${data.priority==='긴급'?'red':''}">${data.priority}</span></div><h3 style="margin-top:16px">${data.need}</h3><p>${data.type} · ${data.category} · ${data.requiredQty}${data.unit} · ${data.due}</p><div class="photo-summary">📷 검토용 사진 ${data.photoCount||0}장 첨부</div><div class="privacy"><b>保</b><p>실명, 전화번호, 상세 주소, 상담 원문은 후원자 화면에 표시되지 않습니다.</p></div></article><div class="dock"><button class="primary full" data-finalize-case='${JSON.stringify(data).replace(/'/g,"&#39;")}'>등록하고 추천 보기</button></div>`,'',{noNav:true})}
function currentCase(){return state.cases.find(c=>c.id===state.selectedCaseId)||state.cases[0]}
function currentOffer(){return state.offers.find(o=>o.id===state.selectedOffer)||state.offers.find(o=>o.status==='제공 가능')}
function dueToISO(text){const m=String(text||'').match(/(\d+)월\s*(\d+)일/);return m?`2026-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`:'2026-12-31'}
function needCategory(c){if(c.category)return c.category;const n=c.need;return n.includes('식사')?'식사':n.includes('생필품')?'물품':n.includes('이발')||n.includes('서비스')?'서비스':'전체'}
function resourceFit(o,c){const reasons=[];let score=0;if(needCategory(c)===o.category){score+=45;reasons.push('카테고리 일치')}if(o.qty>=c.requiredQty){score+=25;reasons.push('필요 수량 충족')}if(!c.dueISO||o.availableUntil>=c.dueISO){score+=15;reasons.push('지원 기한 충족')}if(o.region===c.region){score+=10;reasons.push('같은 지역')}if(o.verified){score+=5;reasons.push('인증 완료')}return{score,reasons}}
function availableOffers(category=state.resourceFilters.category,keyword=state.resourceFilters.keyword){const k=String(keyword||'').trim().toLowerCase();return state.offers.filter(o=>o.status==='제공 가능').filter(o=>category==='전체'||o.category===category).filter(o=>!k||`${o.title} ${o.org} ${o.category}`.toLowerCase().includes(k)).sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')))}
function filteredResources(){const c=currentCase(),f=state.resourceFilters;return availableOffers(f.category).filter(o=>f.availability==='전체'||f.availability==='충분'&&o.qty>=c.requiredQty||f.availability==='기한 충족'&&o.availableUntil>=c.dueISO).map(o=>({...o,fit:resourceFit(o,c)})).sort((a,b)=>b.fit.score-a.fit.score||String(b.createdAt||'').localeCompare(String(a.createdAt||'')))}
function matchableCases(){const matched=new Set(state.matches.filter(m=>m.status!=='수정 요청').map(m=>m.caseId));return state.cases.filter(c=>!matched.has(c.id)&&c.status!=='완료')}
function memberResources(){const items=availableOffers();if(items.length&&!items.some(o=>o.id===state.selectedOffer))state.selectedOffer=items[0].id;if(!items.length)state.selectedOffer=null;layout(`${header()}<div class="connect-intro"><strong>후원 나눔 먼저 선택</strong><p>등록된 후원 물품·서비스를 보고 선택한 뒤, 연결할 미매칭 케이스를 고릅니다.</p></div><div class="category-chips" aria-label="후원 나눔 카테고리">${['전체','식사','물품','서비스'].map(x=>`<button class="${state.resourceFilters.category===x?'active':''}" data-resource-category="${x}">${x}</button>`).join('')}</div><details class="advanced-filter"><summary>후원 나눔 검색</summary><form class="resource-filter" id="resource-filter-form"><div class="resource-search-row"><input id="resource-keyword" class="input" placeholder="나눔·후원처 검색" value="${state.resourceFilters.keyword}"><button type="button" class="secondary" data-filter-resources>적용</button></div><input id="resource-category" type="hidden" value="${state.resourceFilters.category}"><input id="resource-availability" type="hidden" value="전체"></form></details><div class="section-head"><h3>후원 물품·서비스</h3><span class="tiny">최신 등록순 · ${items.length}건</span></div><div class="list resource-list">${items.length?items.map(o=>`<article class="resource-card ${state.selectedOffer===o.id?'selected':''}" data-select-offer="${o.id}"><div class="row between"><div class="row gap"><span class="pill">${o.category}</span><span class="tiny">${o.recentActivity}</span></div><span class="choose">${state.selectedOffer===o.id?'✓':''}</span></div><h3>${o.title}</h3><p><strong>${o.org}</strong> · ${o.qty}${o.unit} 제공 가능</p><div class="resource-meta"><span>제공기한 ${o.availableUntil}</span><span>${o.deliveryMethods.join(' · ')}</span></div></article>`).join(''):`<div class="empty-state"><strong>등록된 후원 나눔이 없어요.</strong><p>다른 카테고리를 선택하거나 검색 조건을 변경해 주세요.</p></div>`}</div><div class="dock"><button class="primary full" data-open-case-picker ${items.length?'':'disabled'}>선택한 나눔에 케이스 연결</button></div>`,roleNav())}
function memberSelectCase(){const o=currentOffer(),cases=matchableCases();if(cases.length&&!cases.some(c=>c.id===state.selectedCaseId))state.selectedCaseId=cases[0].id;layout(`${header('케이스 선택',true)}<div class="selected-offer-summary"><span class="pill">${o.category}</span><strong>${o.title}</strong><p>${o.org} · ${o.qty}${o.unit} 제공 가능</p></div><div class="page-head"><h1>연결할 케이스</h1><p>아직 매칭되지 않은 케이스만 표시됩니다.</p></div><div class="list match-case-list">${cases.length?cases.map(c=>{const fit=resourceFit(o,c);return `<article class="match-case-card ${state.selectedCaseId===c.id?'selected':''}" data-select-match-case="${c.id}"><div class="row between"><span class="case-code">${c.code}</span><span class="pill ${c.priority==='긴급'?'red':''}">${c.priority}</span></div><h3>${c.need}</h3><p>${c.type} · ${c.requiredQty}${c.unit} 필요 · ${c.due}</p><div class="reason-box"><b>${fit.score}% 조건 일치</b><span>${fit.reasons.join(' · ')||'수동 확인 필요'}</span></div></article>`}).join(''):`<div class="empty-state"><strong>연결 가능한 미매칭 케이스가 없어요.</strong><p>새 케이스를 등록하거나 기존 매칭 상태를 확인해 주세요.</p></div>`}</div><div class="dock"><button class="primary full" data-open-proposal ${cases.length?'':'disabled'}>이 케이스로 매칭 신청</button></div>`,'',{noNav:true})}
function caseRecommendations(){const c=currentCase(),items=availableOffers(c.category,'').map(o=>({...o,fit:resourceFit(o,c)})).sort((a,b)=>b.fit.score-a.fit.score||String(b.createdAt).localeCompare(String(a.createdAt)));layout(`${header('자동 추천',true)}<div class="page-head"><p class="eyebrow">CASE REGISTERED</p><h1>유사한 후원 나눔</h1><p>${c.need} · ${c.requiredQty}${c.unit} 조건으로 찾았습니다.</p></div><div class="list recommendation-list">${items.length?items.map(o=>`<article class="resource-card"><div class="row between"><span class="pill">${o.category}</span><strong class="fit-score">${o.fit.score}% 조건 일치</strong></div><h3>${o.title}</h3><p><strong>${o.org}</strong> · ${o.qty}${o.unit} 제공 가능</p><div class="reason-box"><b>추천 이유</b><span>${o.fit.reasons.join(' · ')}</span></div><button class="primary full" data-use-recommendation="${o.id}">이 나눔으로 바로 매칭 신청</button></article>`).join(''):`<div class="empty-state"><strong>현재 유사한 후원 나눔이 없어요.</strong><p>케이스는 저장됐으며 연결 탭에서 나중에 매칭할 수 있습니다.</p></div>`}</div><div class="skip-action"><button class="ghost full" data-skip-recommendations>나중에 연결하기</button></div>`,'',{noNav:true})}
function matchProposalForm(){const c=currentCase(),o=currentOffer();if(!c||!o)return go('member-resources');const d=state.draftMatch||{};layout(`${header('매칭 제안',true)}<div class="match-pair"><div><span class="case-code">${c.code}</span><strong>${c.need}</strong><small>${c.requiredQty}${c.unit} 필요</small></div><i>→</i><div><span class="pill">${o.category}</span><strong>${o.title}</strong><small>${o.org} · ${o.qty}${o.unit} 가능</small></div></div><form class="form match-form" id="match-proposal-form"><div class="row gap"><div class="field grow"><label for="allocation-qty">할당 수량</label><input class="input" id="allocation-qty" type="number" min="1" max="${o.qty}" value="${d.allocationQty||Math.min(c.requiredQty,o.qty)}" required></div><div class="field unit-field"><label>단위</label><div class="input readonly">${o.unit}</div></div></div><div class="field"><label for="delivery-date">희망 전달일</label><input class="input" id="delivery-date" type="date" value="${d.deliveryDate||c.dueISO||''}" required></div><div class="field"><label for="delivery-method">전달 방식</label><select class="input" id="delivery-method">${o.deliveryMethods.map(x=>`<option ${d.deliveryMethod===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label for="proposal-reason">매칭 제안 사유</label><textarea class="input" id="proposal-reason" required>${d.reason||`${c.need}의 품목·수량·지원 기한과 일치합니다.`}</textarea></div><div class="row gap"><div class="field grow"><label for="lead-member">담당 위원</label><select class="input" id="lead-member"><option>김이음</option><option>박연결</option></select></div><div class="field grow"><label for="support-member">보조 담당자</label><select class="input" id="support-member"><option>박연결</option><option>최안전</option><option>미지정</option></select></div></div><div class="form-note"><strong>자동 매칭이 아닙니다.</strong><br>제출 후 운영 검토와 협의체 공동 승인 2인을 거쳐 확정됩니다.</div><div class="dock"><button type="button" class="primary full" data-preview-proposal>비식별 제안 미리보기</button></div></form>`,'',{noNav:true})}
function matchProposalPreview(){const c=currentCase(),o=currentOffer(),d=state.draftMatch;if(!d)return go('member-match-form');layout(`${header('제안 미리보기',true)}<div class="page-head"><p class="eyebrow">MATCH PROPOSAL</p><h1>제출 전 확인</h1><p>대상자의 직접 식별정보는 포함되지 않습니다.</p></div><article class="card proposal-review flat"><div class="row between"><span class="case-code">${c.code}</span><span class="pill ${c.priority==='긴급'?'red':''}">${c.priority}</span></div><h3>${c.need} ↔ ${o.title}</h3><div class="review-grid"><span>할당 수량</span><strong>${d.allocationQty}${o.unit}</strong><span>희망 전달일</span><strong>${d.deliveryDate}</strong><span>전달 방식</span><strong>${d.deliveryMethod}</strong><span>담당 위원</span><strong>${d.leadMember}${d.supportMember==='미지정'?'':` · ${d.supportMember}`}</strong></div><div class="reason-box"><b>제안 사유</b><span>${d.reason}</span></div><div class="privacy"><b>保</b><p>후원자에게 실명·전화번호·상세 주소는 공개되지 않습니다.</p></div><div class="stock-note">재고는 최종 승인 시 예약되며, 현재는 제안 상태입니다.</div></article><div class="dock"><div class="row gap"><button class="secondary grow" data-go="member-match-form">수정</button><button class="primary grow" data-submit-proposal>매칭 제안 제출</button></div></div>`,'',{noNav:true})}
function memberActivity(){const mine=state.matches.filter(m=>m.leadMember==='김이음');layout(`${header()}<div class="page-head"><p class="eyebrow">ACTIVITY</p><h1>나의 활동</h1><p>제안부터 승인·전달까지 상태 변경을 확인합니다.</p></div><div class="stat-grid"><div class="card stat flat"><strong>${mine.length}</strong><span>매칭 제안</span></div><div class="card stat flat"><strong>${mine.filter(m=>['배송 대기','배송 중','완료'].includes(m.status)).length}</strong><span>승인 완료</span></div></div><div class="list">${mine.map(m=>`<article class="card list-card flat"><div class="row between"><span class="case-code">${m.caseCode}</span><span class="pill ${m.status==='승인 완료'?'':'warn'}">${m.status}</span></div><h3>${m.need} · ${m.allocationQty}${m.unit}</h3><p>${m.donor} · ${m.deliveryDate} · ${m.deliveryMethod}</p></article>`).join('')}</div>`,roleNav())}
function caseDetail(id){const c=state.cases.find(x=>x.id===id);layout(`${header('케이스 상세',true)}<div class="page-head"><div class="row between"><span class="case-code">${c.code}</span><span class="pill ${c.priority==='긴급'?'red':''}">${c.priority}</span></div><h1 style="margin-top:12px">${c.need}</h1><p>${c.type} · ${c.region} · ${c.due}</p></div><article class="card action-card flat"><h3>진행 상태</h3><div class="timeline"><div class="timeline-row done"><i class="timeline-dot"></i><div><strong>케이스 승인</strong><p>최소 정보와 동의 근거를 확인했어요.</p></div></div><div class="timeline-row done"><i class="timeline-dot"></i><div><strong>매칭 제안</strong><p>정담식당 도시락 7세트</p></div></div><div class="timeline-row"><i class="timeline-dot"></i><div><strong>공동 승인</strong><p>운영자 검토 대기</p></div></div></div><button class="primary full" data-go="member-resources">다른 자원 찾아보기</button></article>`,'',{noNav:true})}
function adminHome(){layout(`${header()}<div class="page-head"><p class="eyebrow">OPERATIONS</p><h1>오늘의 운영 현황</h1><p>선부3동 운영 사무국 · 7월 10일</p></div><div class="stat-grid"><div class="card stat flat"><strong>${state.cases.length}</strong><span>진행 케이스</span></div><div class="card stat flat"><strong>${state.matches.length}</strong><span>승인 대기 매칭</span></div><div class="card stat flat"><strong>10</strong><span>인증 나눔가게</span></div><div class="card stat flat"><strong>18</strong><span>이번 달 완료</span></div></div><div class="section-head"><h3>긴급 확인</h3><button class="text-btn" data-go="admin-reviews">검토함</button></div><article class="card action-card admin-alert"><span class="pill red">긴급</span><h3 style="margin-top:12px">식사 지원 매칭 승인 대기</h3><p class="case-code">SUNBU3-A-2026-014</p><button class="primary full" data-go="admin-match-review">지금 검토</button></article><div class="section-head"><h3>운영 알림</h3></div><div class="card table-card flat"><div class="table-row"><span class="pill warn">대기</span><div class="grow"><strong>나눔가게 인증 2건</strong><span>서류 검토가 필요합니다.</span></div><span>›</span></div><div class="table-row"><span class="pill">보고</span><div class="grow"><strong>6월 월간 보고서 초안</strong><span>개인정보 제외 집계 완료</span></div><span>›</span></div></div>`,roleNav())}

 if(e.target.closest('[data-complete-delivery]')){const m=state.matches.find(x=>x.id===state.selectedMatchId),c=state.cases.find(x=>x.id===m.caseId);m.status='완료';m.completedAt=new Date().toLocaleString('ko-KR');if(c)c.status='완료';success('전달을 완료했어요.','배송·전달 기록이 완료 처리되고 활동 이력에 보관됩니다.','admin-reviews','검토함으로')}
 if(e.target.closest('[data-reject-match]')){const m=state.matches.find(x=>x.id===state.selectedMatchId)||state.matches[0];m.status='수정 요청';toast('수정 요청과 검토 의견을 기록했습니다.');go('admin-reviews')}
 if(e.target.closest('[data-report]'))toast('보고서 미리보기는 다음 프로토타입에서 연결됩니다.');
});
document.addEventListener('change',e=>{if(e.target.matches('#resource-case')){state.selectedCaseId=Number(e.target.value);state.selectedOffer=filteredResources()[0]?.id||null;state.draftMatch=null;render()}});
document.addEventListener('change',e=>{if(!e.target.matches('#case-photos'))return;const files=[...e.target.files].filter(f=>f.type.startsWith('image/'));const room=Math.max(0,8-state.casePhotos.length);const selected=files.slice(0,room);if(!selected.length){toast(room?'이미지 파일을 선택해 주세요.':'사진은 최대 8장까지 등록할 수 있어요.');return}Promise.all(selected.map(file=>new Promise(resolve=>{const reader=new FileReader();reader.onload=()=>resolve({name:file.name,src:reader.result});reader.readAsDataURL(file)}))).then(items=>{state.casePhotos.push(...items);renderPhotoPreview();toast(`사진 ${items.length}장을 추가했어요.`)});if(files.length>room)toast('사진은 최대 8장까지 등록할 수 있어요.')});
document.addEventListener('change',e=>{if(!e.target.matches('#offer-photos'))return;const files=[...e.target.files].filter(f=>f.type.startsWith('image/'));const room=Math.max(0,8-state.offerPhotos.length);const selected=files.slice(0,room);if(!selected.length){toast(room?'이미지 파일을 선택해 주세요.':'사진은 최대 8장까지 등록할 수 있어요.');return}Promise.all(selected.map(file=>new Promise(resolve=>{const reader=new FileReader();reader.onload=()=>resolve({name:file.name,src:reader.result});reader.readAsDataURL(file)}))).then(items=>{state.offerPhotos.push(...items);renderOfferPhotoPreview();toast(`사진 ${items.length}장을 추가했어요.`)});if(files.length>room)toast('사진은 최대 8장까지 등록할 수 있어요.')});
document.addEventListener('click',e=>{const remove=e.target.closest('[data-remove-photo]');if(!remove)return;state.casePhotos.splice(Number(remove.dataset.removePhoto),1);renderPhotoPreview();toast('사진을 삭제했어요.')});
document.addEventListener('click',e=>{const remove=e.target.closest('[data-remove-offer-photo]');if(!remove)return;state.offerPhotos.splice(Number(remove.dataset.removeOfferPhoto),1);renderOfferPhotoPreview();toast('사진을 삭제했어요.')});
document.querySelector('#close-role').addEventListener('click',()=>document.querySelector('#role-modal').classList.remove('show'));document.querySelector('#role-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show')});render();
</script>
