<style>
:root{--ink:#27332d;--ink2:#566159;--ink3:#89928b;--paper:#f5f3ec;--surface:#fffefa;--white:#fff;--line:#dedfd9;--sage:#dce5de;--sage2:#edf2ed;--green:#2e6b4f;--green2:#194c37;--amber:#b9802c;--amber2:#fff0d5;--red:#a94942;--red2:#f9e5e2;--blue:#4b6e79;--shadow:0 14px 40px rgba(39,51,45,.08),0 2px 10px rgba(39,51,45,.04);--x:20px;--nav:76px;font-family:Pretendard,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;color:var(--ink);font-synthesis:none}
*{box-sizing:border-box}html,body{min-height:100%;margin:0}body{background:#202622;-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit}button{color:inherit}button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid rgba(46,107,79,.24);outline-offset:2px}.shell{position:relative;width:min(100%,430px);min-height:100dvh;margin:auto;background:var(--paper);overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.28)}.view{min-height:100dvh;padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom) + 18px);animation:enter .22s ease both}.view.no-nav{padding-bottom:20px}@keyframes enter{from{opacity:.3;transform:translateY(5px)}}h1,h2,h3,p{margin-top:0}h1{font-family:"Noto Serif KR",Georgia,serif;font-size:30px;line-height:1.22;letter-spacing:-.04em;margin-bottom:10px}h2{font-family:"Noto Serif KR",Georgia,serif;font-size:24px;line-height:1.3;letter-spacing:-.035em;margin-bottom:8px}h3{font-size:16px;line-height:1.35;margin-bottom:5px;letter-spacing:-.02em}p{font-size:14px;line-height:1.6;color:var(--ink2)}.eyebrow{margin:0 0 8px;font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--green);text-transform:uppercase}.muted{color:var(--ink2)}.tiny{font-size:11px;color:var(--ink3)}.row{display:flex;align-items:center}.between{justify-content:space-between}.gap{gap:10px}.grow{flex:1}.card{background:var(--surface);border:1px solid var(--line);border-radius:17px;box-shadow:var(--shadow)}.card.flat{box-shadow:none}.pill{display:inline-flex;align-items:center;min-height:27px;padding:5px 9px;border-radius:999px;background:var(--sage2);color:var(--green2);font-size:10px;font-weight:800}.pill.warn{background:var(--amber2);color:#72501d}.pill.red{background:var(--red2);color:var(--red)}.pill.dark{background:var(--ink);color:var(--paper)}.primary,.secondary,.ghost{min-height:50px;border-radius:13px;padding:12px 16px;border:1px solid transparent;font-weight:780;font-size:14px;cursor:pointer;transition:.16s}.primary{background:var(--ink);color:var(--paper)}.primary:hover{background:#18221d}.secondary{background:var(--surface);border-color:var(--line)}.ghost{background:transparent}.full{width:100%}.small{min-height:42px;padding:9px 13px;font-size:12px}.primary:active,.secondary:active{transform:scale(.985)}.icon-btn{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);background:var(--surface);cursor:pointer}.top{position:sticky;top:0;z-index:20;padding:max(12px,env(safe-area-inset-top)) var(--x) 10px;background:rgba(245,243,236,.94);backdrop-filter:blur(15px);display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:baseline;gap:7px;font-weight:850;letter-spacing:.08em;font-size:15px}.brand small{font-family:"Noto Serif KR",serif;color:var(--ink3);font-weight:500;letter-spacing:.04em}.role-btn{border:1px solid var(--line);background:var(--surface);border-radius:999px;min-height:38px;padding:7px 11px;font-size:11px;font-weight:780;cursor:pointer}.back{border:0;background:transparent;width:44px;height:44px;margin-left:-9px;font-size:26px;cursor:pointer}.page-head{padding:24px var(--x) 8px}.page-head h1{font-size:27px}.section-head{margin:25px var(--x) 11px;display:flex;align-items:center;justify-content:space-between}.section-head h3{margin:0}.text-btn{border:0;background:transparent;color:var(--green);min-height:40px;font-size:12px;font-weight:800;cursor:pointer}.list{margin:0 var(--x);display:grid;gap:10px}.list-card{padding:16px}.list-card.click{cursor:pointer}.list-card h3{margin-top:10px}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px var(--x)}.stat{padding:15px}.stat strong{display:block;font-family:"Noto Serif KR",serif;font-size:26px;letter-spacing:-.04em}.stat span{font-size:11px;color:var(--ink2)}.notice{margin:14px var(--x);padding:15px;background:var(--ink);border-radius:17px;color:var(--paper)}.notice p{color:#d7ddd8;margin:6px 0 0;font-size:12px}.notice .pill{background:rgba(255,255,255,.12);color:#fff}.notice .secondary{color:var(--ink);background:var(--surface)}.action-card{margin:12px var(--x);padding:18px}.action-card .primary{margin-top:14px}.progress{height:7px;background:#e5e8e3;border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:var(--green);border-radius:inherit}.field{margin-bottom:16px}.field label{display:block;font-size:12px;font-weight:800;margin-bottom:7px}.input{width:100%;min-height:50px;border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:11px 13px;color:var(--ink)}textarea.input{min-height:105px;resize:vertical;line-height:1.55}.form{padding:12px var(--x) 110px}.form-note{padding:13px 14px;border-radius:12px;background:var(--sage2);font-size:11px;line-height:1.55;color:var(--ink2);margin-bottom:18px}.dock{position:fixed;z-index:45;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,430px);padding:11px var(--x) calc(11px + env(safe-area-inset-bottom));background:rgba(255,254,250,.95);border-top:1px solid var(--line);backdrop-filter:blur(14px)}.tabs{position:fixed;z-index:40;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,430px);height:calc(var(--nav) + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);padding:7px 10px env(safe-area-inset-bottom);background:rgba(255,254,250,.96);border-top:1px solid var(--line);backdrop-filter:blur(15px)}.tab{border:0;background:transparent;color:var(--ink3);font-size:10px;font-weight:760;display:grid;place-items:center;align-content:center;gap:5px;cursor:pointer}.tab b{width:36px;height:29px;border-radius:10px;display:grid;place-items:center;font-size:17px;font-weight:500}.tab.active{color:var(--green2)}.tab.active b{background:var(--sage)}.welcome{min-height:100dvh;padding:54px 24px 30px;background:var(--paper);display:flex;flex-direction:column}.welcome-mark{font-family:"Noto Serif KR",serif;font-size:56px;line-height:1;margin-top:64px;letter-spacing:.08em}.welcome-copy h1{font-size:31px;margin-top:20px}.role-list{display:grid;gap:10px;margin-top:28px}.role-card{width:100%;padding:17px;text-align:left;border:1px solid var(--line);border-radius:16px;background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:14px}.role-card:hover{border-color:#9ead9f}.role-icon{width:46px;height:46px;border-radius:15px;background:var(--sage2);display:grid;place-items:center;font-family:"Noto Serif KR",serif;font-size:20px}.role-card strong{display:block;font-size:15px}.role-card span{display:block;margin-top:4px;font-size:11px;color:var(--ink2)}.prototype-note{margin-top:auto;padding-top:24px;text-align:center;color:var(--ink3);font-size:10px}.case-code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;letter-spacing:.04em;color:var(--green)}.timeline{margin-top:15px}.timeline-row{display:grid;grid-template-columns:18px 1fr;gap:9px;min-height:58px}.timeline-dot{width:11px;height:11px;border-radius:50%;background:var(--line);margin-top:4px;position:relative}.timeline-row:not(:last-child) .timeline-dot:after{content:"";position:absolute;left:5px;top:12px;width:1px;height:45px;background:var(--line)}.timeline-row.done .timeline-dot{background:var(--green)}.timeline-row strong{font-size:12px}.timeline-row p{font-size:11px;margin:3px 0}.candidate{padding:16px}.candidate.selected{border-color:#7e9b88;background:#fbfffb}.candidate .choose{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink3);display:grid;place-items:center}.candidate.selected .choose{background:var(--green);border-color:var(--green);color:#fff}.admin-alert{border-left:4px solid var(--amber);padding-left:13px}.table-card{margin:0 var(--x);overflow:hidden}.table-row{padding:14px 15px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}.table-row:last-child{border:0}.table-row .grow strong{display:block;font-size:13px}.table-row .grow span{font-size:10px;color:var(--ink3)}.toast{position:fixed;z-index:100;left:50%;bottom:94px;transform:translate(-50%,15px);width:min(calc(100% - 40px),390px);padding:13px 15px;border-radius:13px;background:var(--ink);color:var(--paper);font-size:12px;font-weight:700;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}.modal{display:none;position:fixed;z-index:120;inset:0;background:rgba(24,34,29,.4);backdrop-filter:blur(3px);align-items:flex-end;justify-content:center}.modal.show{display:flex}.sheet{width:min(100%,430px);background:var(--surface);padding:20px var(--x) calc(20px + env(safe-area-inset-bottom));border-radius:24px 24px 0 0}.sheet h2{margin-top:8px}.role-switch{display:grid;gap:8px}.role-switch button{width:100%;text-align:left;padding:14px;border-radius:13px;border:1px solid var(--line);background:var(--surface);cursor:pointer}.role-switch button.active{background:var(--sage2);border-color:#91a99a}.success{padding:40px var(--x);text-align:center}.success-mark{width:76px;height:76px;border-radius:50%;margin:45px auto 22px;background:var(--sage);display:grid;place-items:center;font-size:34px}.privacy{display:flex;gap:10px;padding:13px;border-radius:13px;background:var(--sage2);margin-top:14px}.privacy b{font-size:18px}.privacy p{font-size:11px;margin:0}@media(min-width:600px){body{padding:22px 0}.shell{min-height:calc(100dvh - 44px);border-radius:28px}.view,.welcome{min-height:calc(100dvh - 44px)}.tabs,.dock{bottom:22px;border-radius:0 0 28px 28px}.toast{bottom:115px}}@media(max-width:350px){:root{--x:16px}h1{font-size:27px}.welcome{padding-left:20px;padding-right:20px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
<style>
.overview-entry{margin-top:12px;background:transparent;border:1px solid var(--ink);color:var(--ink)}
.process-page{padding-bottom:34px}.process-intro{padding:22px var(--x) 5px}.role-legend{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:14px var(--x)}.legend-item{padding:11px 6px;text-align:center;border:1px solid var(--line);border-radius:12px;background:var(--surface)}.legend-item b{display:block;font-family:"Noto Serif KR",serif;font-size:18px}.legend-item span{font-size:10px;color:var(--ink2)}
.master-flow{margin:16px var(--x);padding:17px}.flow-step{display:grid;grid-template-columns:35px 1fr;gap:11px;position:relative;min-height:72px}.flow-step:not(:last-child):before{content:"";position:absolute;left:17px;top:34px;bottom:-2px;width:1px;background:var(--line)}.flow-no{width:35px;height:35px;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:var(--paper);font-size:11px;font-weight:850;z-index:1}.flow-copy{padding:1px 0 13px}.flow-copy strong{display:block;font-size:14px}.flow-copy p{margin:3px 0 7px;font-size:11px}.role-tag{display:inline-flex;min-height:23px;align-items:center;padding:4px 7px;border-radius:999px;font-size:9px;font-weight:800;margin-right:4px}.role-tag.member{background:var(--sage);color:var(--green2)}.role-tag.donor{background:var(--amber2);color:#72501d}.role-tag.admin{background:#e5ecef;color:#365966}
.scenario-grid{display:grid;gap:9px;margin:0 var(--x)}.scenario{padding:15px}.scenario-top{display:flex;align-items:center;justify-content:space-between;gap:8px}.scenario h3{margin:10px 0 9px}.mini-flow{display:flex;align-items:center;gap:5px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}.mini-flow::-webkit-scrollbar{display:none}.mini-flow span{flex:0 0 auto;padding:7px 9px;border-radius:9px;background:var(--sage2);font-size:10px;font-weight:720}.mini-flow i{font-style:normal;color:var(--ink3);font-size:12px}.scenario-note{font-size:10px;color:var(--ink2);margin:9px 0 0}.process-principle{margin:16px var(--x);padding:16px;background:var(--ink);color:var(--paper);border-radius:16px}.process-principle p{color:#d4ddd8;font-size:11px;margin:6px 0 0}
</style>

<body>
<main class="shell" id="app" aria-label="이음 앱 클릭형 프로토타입"></main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="modal" id="role-modal" role="dialog" aria-modal="true" aria-label="역할 전환"><div class="sheet"><p class="eyebrow">PROTOTYPE MODE</p><h2>역할을 바꿔 볼까요?</h2><p>하나의 서비스에서 권한에 따라 다른 업무 화면을 제공합니다.</p><div class="role-switch" id="role-switch"></div><button class="ghost full" id="close-role">닫기</button></div></div>
<script>
const roles={donor:{label:'후원자',org:'선부동 행복마트',desc:'나눔을 등록하고 전달을 확인해요'},member:{label:'협의체 위원',org:'선부3동 지역사회보장협의체',desc:'필요를 발굴하고 나눔과 연결해요'},admin:{label:'운영자',org:'선부3동 운영 사무국',desc:'승인·안전·활동을 관리해요'}};
const state={role:null,screen:'welcome',selectedOffer:1,toastTimer:null,offers:[{id:1,title:'한 끼 도시락',category:'식사',qty:20,unit:'세트',status:'제공 가능',org:'정담식당'},{id:2,title:'생필품 꾸러미',category:'물품',qty:8,unit:'꾸러미',status:'제공 가능',org:'선부 행복마트'},{id:3,title:'어르신 이발 봉사',category:'서비스',qty:4,unit:'회',status:'승인 대기',org:'참고운 미용실'}],cases:[{id:1,code:'SUNBU3-A-2026-014',type:'독거 어르신',need:'한 끼 식사 지원',priority:'긴급',status:'매칭 검토',region:'선부3동',due:'7월 12일까지'},{id:2,code:'SUNBU3-B-2026-009',type:'한부모 3인 가구',need:'생필품 꾸러미',priority:'일반',status:'자원 탐색',region:'선부3동',due:'7월 중'}],matches:[{id:1,caseCode:'SUNBU3-A-2026-014',need:'한 끼 식사 지원',offer:'한 끼 도시락 7세트',donor:'정담식당',status:'공동 승인 대기'}]};
const app=document.querySelector('#app');
const icon={home:'⌂',offer:'＋',match:'⇄',history:'◷',case:'□',resource:'◇',activity:'✓',review:'!',org:'◎',report:'▤'};
function toast(msg){const e=document.querySelector('#toast');e.textContent=msg;e.classList.add('show');clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>e.classList.remove('show'),2200)}
function header(title='',back=false){return `<header class="top">${back?`<button class="back" data-back aria-label="뒤로가기">‹</button>`:`<div class="brand">IEUM <small>理音</small></div>`}<div style="font-weight:800;font-size:15px">${title}</div>${back?'<span style="width:44px"></span>':`<button class="role-btn" data-role-modal>${roles[state.role].label}⌄</button>`}</header>`}
function tabs(items){return `<nav class="tabs" aria-label="주요 메뉴">${items.map(x=>`<button class="tab ${state.screen===x[0]?'active':''}" data-go="${x[0]}"><b>${icon[x[2]]||'·'}</b><span>${x[1]}</span></button>`).join('')}</nav>`}
function layout(body,nav='',opts={}){app.innerHTML=`<section class="view ${opts.noNav?'no-nav':''}">${body}${nav}</section>`;window.scrollTo({top:0,behavior:'instant'})}
function go(screen){state.screen=screen;render()}
function welcome(){layout(`<section class="welcome"><div class="brand">IEUM <small>理音</small></div><div class="welcome-mark">이 음</div><div class="welcome-copy"><p class="eyebrow">선부3동 나눔 연결 플랫폼</p><h1>들리지 않던 이웃의 사정을,<br>조용히 잇는 일.</h1><p>이 클릭형 프로토타입에서는 역할별 핵심 업무 흐름을 체험할 수 있습니다.</p></div><div class="role-list">${Object.entries(roles).map(([k,v])=>`<button class="role-card" data-role="${k}"><span class="role-icon">${k==='donor'?'心':k==='member'?'結':'保'}</span><span><strong>${v.label}${k==='member'?'으로':'로'} 둘러보기</strong><span>${v.desc}</span></span></button>`).join('')}</div><button class="secondary full overview-entry" data-go="process-map">전체 프로세스 한눈에 보기 →</button><div class="prototype-note">데모 데이터만 사용하는 제품 검증용 프로토타입입니다.</div></section>`,'',{noNav:true})}
function processMap(){layout(`<section class="process-page">${header('전체 프로세스',true)}<div class="process-intro"><p class="eyebrow">ONE-PAGE PROCESS MAP</p><h1>필요를 발견한 순간부터<br>안전한 전달까지.</h1><p>세 역할이 어떤 순서로 연결되는지, 예외 상황에서는 어떻게 처리하는지 한 페이지에 정리했습니다.</p></div><div class="role-legend"><div class="legend-item"><b>心</b><span>후원자</span></div><div class="legend-item"><b>結</b><span>협의체 위원</span></div><div class="legend-item"><b>保</b><span>운영자</span></div></div><article class="card master-flow flat"><div class="flow-step"><span class="flow-no">01</span><div class="flow-copy"><strong>필요 발굴·비식별 등록</strong><p>대상자 계정 없이 위원이 필요한 내용만 기록합니다.</p><span class="role-tag member">협의체 위원</span></div></div><div class="flow-step"><span class="flow-no">02</span><div class="flow-copy"><strong>케이스 검토</strong><p>동의 근거·최소 정보·우선순위를 확인합니다.</p><span class="role-tag admin">운영자</span></div></div><div class="flow-step"><span class="flow-no">03</span><div class="flow-copy"><strong>나눔 자원 등록·인증</strong><p>인증 나눔가게가 수량과 제공 기간을 등록합니다.</p><span class="role-tag donor">후원자</span><span class="role-tag admin">운영자</span></div></div><div class="flow-step"><span class="flow-no">04</span><div class="flow-copy"><strong>자원 탐색·매칭 제안</strong><p>카테고리·수량·기간이 맞는 자원을 위원이 선택합니다.</p><span class="role-tag member">협의체 위원</span></div></div><div class="flow-step"><span class="flow-no">05</span><div class="flow-copy"><strong>협의체 공동 승인</strong><p>개인 위원의 단독 결정이 아니라 정족수 검토를 거칩니다.</p><span class="role-tag admin">운영자·승인자</span></div></div><div class="flow-step"><span class="flow-no">06</span><div class="flow-copy"><strong>일정 확정·위원 중개 전달</strong><p>후원자에게 대상자의 연락처·상세 주소를 공개하지 않습니다.</p><span class="role-tag donor">후원자</span><span class="role-tag member">협의체 위원</span></div></div><div class="flow-step"><span class="flow-no">07</span><div class="flow-copy"><strong>완료 기록·월간 보고</strong><p>식별정보를 제외한 활동 기록과 집계만 남깁니다.</p><span class="role-tag member">협의체 위원</span><span class="role-tag admin">운영자</span></div></div></article><div class="section-head"> function memberResources(){layout(`${header()}<div class="page-head"><p class="eyebrow">RESOURCES</p><h1>나눔 자원 찾기</h1><p>카테고리·수량·기간이 맞는 자원을 찾습니다.</p></div><div class="list">${state.offers.filter(x=>x.status==='제공 가능').map((o,i)=>`<article class="card candidate ${state.selectedOffer===o.id?'selected':''}" data-select-offer="${o.id}"><div class="row between"><span class="pill">${o.category}</span><span class="choose">${state.selectedOffer===o.id?'✓':''}</span></div><h3>${o.title}</h3><p>${o.org} · ${o.qty}${o.unit} 제공 가능</p></article>`).join('')}</div><div class="dock"><button class="primary full" data-propose-match>선택한 자원으로 매칭 제안</button></div>`,roleNav())}
function memberActivity(){layout(`${header()}<div class="page-head"><p class="eyebrow">ACTIVITY</p><h1>나의 활동</h1><p>발굴·매칭·전달 기록을 한곳에서 확인합니다.</p></div><div class="stat-grid"><div class="card stat flat"><strong>7</strong><span>올해 발굴</span></div><div class="card stat flat"><strong>5</strong><span>완료 매칭</span></div></div><div class="list"><article class="card list-card flat"><span class="pill">오늘</span><h3>도시락 매칭 제안</h3><p class="case-code">SUNBU3-A-2026-014</p></article></div>`,roleNav())}
function caseDetail(id){const c=state.cases.find(x=>x.id===id);layout(`${header('케이스 상세',true)}<div class="page-head"><div class="row between"><span class="case-code">${c.code}</span><span class="pill ${c.priority==='긴급'?'red':''}">${c.priority}</span></div><h1 style="margin-top:12px">${c.need}</h1><p>${c.type} · ${c.region} · ${c.due}</p></div><article class="card action-card flat"><h3>진행 상태</h3><div class="timeline"><div class="timeline-row done"><i class="timeline-dot"></i><div><strong>케이스 승인</strong><p>최소 정보와 동의 근거를 확인했어요.</p></div></div><div class="timeline-row done"><i class="timeline-dot"></i><div><strong>매칭 제안</strong><p>정담식당 도시락 7세트</p></div></div><div class="timeline-row"><i class="timeline-dot"></i><div><strong>공동 승인</strong><p>운영자 검토 대기</p></div></div></div><button class="primary full" data-go="member-resources">다른 자원 찾아보기</button></article>`,'',{noNav:true})}
function adminHome(){layout(`${header()}<div class="page-head"><p class="eyebrow">OPERATIONS</p><h1>오늘의 연결이<br>안전하게 진행되고 있어요.</h1><p>선부3동 운영 사무국 · 7월 10일</p></div><div class="stat-grid"><div class="card stat flat"><strong>${state.cases.length}</strong><span>진행 케이스</span></div><div class="card stat flat"><strong>${state.matches.length}</strong><span>승인 대기 매칭</span></div><div class="card stat flat"><strong>10</strong><span>인증 나눔가게</span></div><div class="card stat flat"><strong>18</strong><span>이번 달 완료</span></div></div><div class="section-head"><h3>긴급 확인</h3><button class="text-btn" data-go="admin-reviews">검토함</button></div><article class="card action-card admin-alert"><span class="pill red">긴급</span><h3 style="margin-top:12px">식사 지원 매칭 승인 대기</h3><p class="case-code">SUNBU3-A-2026-014</p><button class="primary full" data-go="admin-match-review">지금 검토</button></article><div class="section-head"><h3>운영 알림</h3></div><div class="card table-card flat"><div class="table-row"><span class="pill warn">대기</span><div class="grow"><strong>나눔가게 인증 2건</strong><span>서류 검토가 필요합니다.</span></div><span>›</span></div><div class="table-row"><span class="pill">보고</span><div class="grow"><strong>6월 월간 보고서 초안</strong><span>개인정보 제외 집계 완료</span></div><span>›</span></div></div>`,roleNav())}
function adminReviews(){layout(`${header()}<div class="page-head"><p class="eyebrow">REVIEW QUEUE</p><h1>검토함</h1><p>승인 대기 업무를 우선순위에 따라 확인합니다.</p></div><div class="list"><article class="card list-card click admin-alert" data-go="admin-match-review"><div class="row between"><span class="case-code">SUNBU3-A-2026-014</span><span class="pill red">긴급</span></div><h3>도시락 7세트 매칭 제안</h3><p>정담식당 · 공동 승인 0/2</p></article><article class="card list-card flat"><span class="pill warn">조직 인증</span><h3>따뜻한 철물점</h3><p>사업자 정보와 담당자 확인 대기</p></article></div>`,roleNav())}
function adminMatchReview(){const m=state.matches[0];layout(`${header('매칭 검토',true)}<div class="page-head"><div class="row between"><span class="case-code">${m.caseCode}</span><span class="pill red">긴급</span></div><h1 style="margin-top:12px">${m.need}</h1><p>독거 어르신 · 선부3동 · 7월 12일까지</p><div class="privacy"><b>保</b><p>운영 검토에도 직접 식별정보는 기본 노출되지 않습니다. 별도 열람에는 권한과 사유가 필요합니다.</p></div></div><article class="card action-card flat"><h3>제안된 연결</h3><div class="row between" style="margin-top:14px"><div><strong>정담식당</strong><div class="tiny">인증 나눔가게</div></div><strong>도시락 7세트</strong></div><hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><div class="field"><label>검토 의견</label><textarea class="input" id="review-note">수량과 전달 방식이 적절합니다.</textarea></div><label class="row gap" style="align-items:flex-start;font-size:11px"><input type="checkbox" id="conflict" style="margin-top:3px"> 이해충돌이 없음을 확인했습니다.</label></article><div class="dock"><div class="row gap"><button class="secondary grow" data-reject-match>수정 요청</button><button class="primary grow" data-approve-match>승인하기</button></div></div>`,'',{noNav:true})}
function adminOrgs(){layout(`${header()}<div class="page-head"><p class="eyebrow">ORGANIZATIONS</p><h1>조직과 사용자</h1><p>승인된 나눔가게와 위원 권한을 관리합니다.</p></div><div class="stat-grid"><div class="card stat flat"><strong>10</strong><span>인증 나눔가게</span></div><div class="card stat flat"><strong>16</strong><span>활동 위원</span></div></div><div class="card table-card flat"><div class="table-row"><span class="pill">인증</span><div class="grow"><strong>정담식당</strong><span>식사 · 담당자 1명</span></div><span>›</span></div><div class="table-row"><span class="pill warn">대기</span><div class="grow"><strong>따뜻한 철물점</strong><span>수리 · 서류 검토</span></div><span>›</span></div></div>`,roleNav())}
function adminReports(){layout(`${header()}<div class="page-head"><p class="eyebrow">REPORTS</p><h1>활동 보고</h1><p>식별정보를 제외한 집계 초안을 검토합니다.</p></div><article class="card action-card"><span class="pill">2026년 6월</span><h3 style="margin-top:14px">월간 활동 보고서 초안</h3><p>신규 케이스 8건 · 완료 매칭 14건 · 참여 가게 7곳</p><div class="progress"><i style="width:100%"></i></div><button class="primary full" data-report>PDF 미리보기</button></article><div class="notice"><span class="pill">개인정보 보호</span><h3 style="margin-top:12px">보고서에는 식별정보가 없습니다.</h3><p>실명·연락처·주소·상담 원문을 제외하고 활동 집계만 제공합니다.</p></div>`,roleNav())}
function success(title,body,next,button='계속하기'){layout(`${header('',true)}<div class="success"><div class="success-mark">✓</div><p class="eyebrow">SAFELY CONNECTED</p><h1>${title}</h1><p>${body}</p><button class="primary full" data-go="${next}">${button}</button></div>`,'',{noNav:true})}
function render(){if(state.screen==='process-map')return processMap();if(!state.role||state.screen==='welcome')return welcome();const map={'donor-home':donorHome,'donor-offers':donorOffers,'offer-form':offerForm,'donor-matches':donorMatches,'donor-match-detail':donorMatchDetail,'donor-history':donorHistory,'member-home':memberHome,'member-cases':memberCases,'case-form':caseForm,'member-resources':memberResources,'member-activity':memberActivity,'admin-home':adminHome,'admin-reviews':adminReviews,'admin-match-review':adminMatchReview,'admin-orgs':adminOrgs,'admin-reports':adminReports};(map[state.screen]||welcome)()}
function roleHome(role){return role==='donor'?'donor-home':role==='member'?'member-home':'admin-home'}
function showRoles(){document.querySelector('#role-switch').innerHTML=Object.entries(roles).map(([k,v])=>`<button class="${state.role===k?'active':''}" data-role-switch="${k}"><strong>${v.label}</strong><div class="tiny">${v.org}</div></button>`).join('');document.querySelector('#role-modal').classList.add('show')}
document.addEventListener('click',e=>{const r=e.target.closest('[data-role]');if(r){state.role=r.dataset.role;go(roleHome(state.role))}const g=e.target.closest('[data-go]');if(g)go(g.dataset.go);if(e.target.closest('[data-back]'))go(state.role?roleHome(state.role):'welcome');if(e.target.closest('[data-role-modal]'))showRoles();const rs=e.target.closest('[data-role-switch]');if(rs){state.role=rs.dataset.role;document.querySelector('#role-modal').classList.remove('show');go(roleHome(state.role))}const cc=e.target.closest('[data-case]');if(cc)caseDetail(Number(cc.dataset.case));const so=e.target.closest('[data-select-offer]');if(so){state.selectedOffer=Number(so.dataset.selectOffer);render()}if(e.target.closest('[data-submit-offer]')){const f=document.querySelector('#offer-form');if(!f.reportValidity())return;const d=new FormData(f);state.offers.unshift({id:Date.now(),title:d.get('title'),category:d.get('category'),qty:Number(d.get('qty')),unit:d.get('unit'),status:'승인 대기',org:roles.donor.org});success('나눔 등록을<br>검토 요청했어요.','운영자가 확인한 뒤 제공 가능한 자원으로 표시됩니다.','donor-offers','나의 나눔 보기')}if(e.target.closest('[data-confirm-donor]')){toast('제공 가능 여부를 확인했어요. 협의체 승인을 기다립니다.')}if(e.target.closest('[data-submit-case]')){const f=document.querySelector('#case-form');if(!f.reportValidity())return;const d=new FormData(f);casePreview({type:d.get('type'),need:d.get('need'),priority:d.get('priority'),due:d.get('due')})}const fc=e.target.closest('[data-finalize-case]');if(fc){const d=JSON.parse(fc.dataset.finalizeCase);state.cases.unshift({id:Date.now(),code:'SUNBU3-X-2026-NEW',type:d.type,need:d.need,priority:d.priority,status:'검토 대기',region:'선부3동',due:d.due});success('케이스를 안전하게<br>검토 요청했어요.','운영자가 최소 정보와 처리 근거를 확인합니다.','member-cases','케이스 목록 보기')}if(e.target.closest('[data-propose-match]')){state.matches[0].status='공동 승인 대기';success('매칭 제안을<br>제출했어요.','개인 위원의 단독 결정이 아니라 협의체 공동 승인 후 확정됩니다.','member-home','위원 홈으로')}if(e.target.closest('[data-approve-match]')){if(!document.querySelector('#conflict').checked)return toast('이해충돌 확인이 필요합니다.');state.matches[0].status='승인 1/2';success('매칭 승인 의견을<br>기록했어요.','다른 승인자의 검토가 완료되면 전달 일정을 정할 수 있습니다.','admin-reviews','검토함으로')}if(e.target.closest('[data-reject-match]'))toast('수정 요청을 등록했습니다.');if(e.target.closest('[data-report]'))toast('보고서 미리보기는 다음 프로토타입에서 연결됩니다.')});
document.querySelector('#close-role').addEventListener('click',()=>document.querySelector('#role-modal').classList.remove('show'));document.querySelector('#role-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show')});render();
</script>
</body>
</html>
